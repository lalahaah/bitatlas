<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 50 300 300" width="100%" height="100%">
  <defs>
    <linearGradient id="cyanToMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="50%" stop-color="#4facfe" />
      <stop offset="100%" stop-color="#f5576c" />
    </linearGradient>
    
    <linearGradient id="magentaToCyan" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f5576c" />
      <stop offset="50%" stop-color="#f093fb" />
      <stop offset="100%" stop-color="#00f2fe" />
    </linearGradient>

    <filter id="glowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="glowHeavy" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 입체적인 'B' 형태의 데이터 리본 (Data Ribbons) -->
  <g stroke-linecap="round" fill="none" filter="url(#glowHeavy)" opacity="0.6">
    <path d="M 200,80 L 200,320" stroke="url(#magentaToCyan)" stroke-width="24" />
    <path d="M 80,180 C 100,70 280,60 300,130 C 320,190 240,195 200,200" stroke="url(#cyanToMagenta)" stroke-width="24" />
    <path d="M 100,260 C 140,190 300,180 320,250 C 340,320 250,330 200,320" stroke="url(#magentaToCyan)" stroke-width="24" />
  </g>

  <g stroke-linecap="round" fill="none" filter="url(#glowLight)">
    <path d="M 200,80 L 200,320" stroke="url(#magentaToCyan)" stroke-width="16" />
    <path d="M 80,180 C 100,70 280,60 300,130 C 320,190 240,195 200,200" stroke="url(#cyanToMagenta)" stroke-width="16" />
    <path d="M 100,260 C 140,190 300,180 320,250 C 340,320 250,330 200,320" stroke="url(#magentaToCyan)" stroke-width="16" />
  </g>
</svg>
